name: Deploy to Cloud Run Jobs

on:
  push:
    branches: [ main ] # Only main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy Repository
        uses: actions/checkout@v4

      - name: Google Cloud Authorization
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Cloud Run Job
        run: |
          gcloud run jobs deploy aviation-etl-job \
            --source . \
            --region europe-west4 \
            --set-env-vars GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}",AVIATION_API_KEY="${{ secrets.AVIATION_API_KEY }}"